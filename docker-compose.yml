version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: industrialiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-industrialiq}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-industrialiq}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - industrialiq-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: industrialiq-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - industrialiq-network

  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: industrialiq-server
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-industrialiq}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.7}
      # Business config (uses defaults if not set)
      TAX_RATE: ${TAX_RATE:-0.08}
      SHIPPING_RATE: ${SHIPPING_RATE:-0.02}
      BULK_DISCOUNT_THRESHOLD: ${BULK_DISCOUNT_THRESHOLD:-10}
      BULK_DISCOUNT_RATE: ${BULK_DISCOUNT_RATE:-0.12}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - industrialiq-network

  # Frontend Web Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: industrialiq-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - industrialiq-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  industrialiq-network:
    driver: bridge
